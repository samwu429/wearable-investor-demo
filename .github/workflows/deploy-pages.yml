# 必须用「GitHub Actions」作为 Pages 源；若用「从分支部署 / 根目录」会发布源码 index.html，
# 浏览器会去加载 /src/main.tsx → 白屏。

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GH_PAGES: '1'
      - name: Verify production index (not dev /src/main.tsx)
        run: |
          if grep -q 'src/main.tsx' dist/index.html; then
            echo 'ERROR: dist/index.html still references Vite dev entry. Build is broken.'
            cat dist/index.html
            exit 1
          fi
          if ! grep -q "${{ github.event.repository.name }}/assets/" dist/index.html; then
            echo 'ERROR: expected hashed assets under repo base path'
            cat dist/index.html
            exit 1
          fi
          test -f dist/404.html || (echo 'missing 404.html'; exit 1)
          test -f dist/.nojekyll || (echo 'missing .nojekyll'; exit 1)
          echo 'OK: dist looks like a Vite production build.'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
